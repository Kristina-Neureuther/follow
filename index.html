<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Follow - Systems Thinking & Focus Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #12141c; /* Beruhigendes, tiefes Dunkelblau-Grau */
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none; /* Verhindert versehentliches Markieren von Text */
        }
        
        /* Der Textblock oben (feste Überschrift) */
        .header-section {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            color: #e0e6ed;
            pointer-events: none; /* Klicks gehen durch den Text ans Canvas */
        }

        /* Die deutsche Überschrift */
        .headline {
            display: block;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Das englische Äquivalent direkt darunter */
        .subheadline {
            display: block;
            font-size: 1.4rem;
            color: #8a99ad;
            margin-top: 8px;
            font-style: italic;
        }

        /* Die neue, dezente Anleitung unten in der Mitte */
        .footer-instructions {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: #5c697a;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            line-height: 1.5;
            pointer-events: none;
        }

        /* Die Prozentanzeige für das Tempo unten rechts */
        .speed-display {
            position: absolute;
            bottom: 25px;
            right: 30px;
            color: #5c697a;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="header-section">
    <span class="headline">Ich finde gute Lösungen</span>
    <span class="subheadline">I discover effective solutions</span>
</div>

<div class="footer-instructions">
    Track the point with your eyes for 2 minutes.<br>
    Choose your own tempo with arrow keys [↑] [↓].
</div>

<div id="speedometer" class="speed-display">Tempo: 100%</div>

<script>
// Start-Geschwindigkeit
let baseSpeed = 0.95; 
let currentSpeed = baseSpeed;
let ballSize = 35; // Größe des Punkts

function setup() {
    createCanvas(windowWidth, windowHeight);
}

function draw() {
    // Kleiner Alpha-Wert für einen ganz zarten Schweif-Effekt
    background(18, 20, 28, 40); 
    
    let time = millis() / 1000;
    let y = height * 0.52; // Perfekt ausbalanciert zwischen Text oben und unten
    
    // Berechnung der Links-Rechts-Bewegung mittels Sinus (5% Puffer zum Rand)
    let margin = width * 0.05; 
    let x = map(sin(time * currentSpeed * TWO_PI), -1, 1, margin, width - margin);
    
    // Wir zeichnen ein sanftes, fokussierendes Licht (helles Pastell-Cyan/Grün)
    noStroke();
    fill(140, 215, 230);
    
    // Hauptpunkt
    ellipse(x, y, ballSize, ballSize);
    
    // Ein kleiner, weicher Glow-Effekt im Hintergrund des Punktes
    fill(140, 215, 230, 30);
    ellipse(x, y, ballSize * 1.6, ballSize * 1.6);
    
    // Überprüfen, ob Tasten gedrückt werden, um das Tempo fließend anzupassen
    handleControls();
}

function handleControls() {
    // Pfeiltaste NACH OBEN -> Schneller
    if (keyIsDown(UP_ARROW)) {
        currentSpeed = min(currentSpeed + 0.01, 2.5);
        updateSpeedDisplay();
    }
    // Pfeiltaste NACH UNTEN -> Langsamer
    if (keyIsDown(DOWN_ARROW)) {
        currentSpeed = max(currentSpeed - 0.01, 0.1);
        updateSpeedDisplay();
    }
}

// Aktualisiert den Prozentwert unten rechts auf dem Bildschirm
function updateSpeedDisplay() {
    let percentage = round((currentSpeed / baseSpeed) * 100);
    document.getElementById('speedometer').innerText = `Tempo: ${percentage}%`;
}

// Setzt das Tempo zurück, wenn man eine beliebige andere Taste drückt (z.B. Leertaste)
function keyPressed() {
    if (keyCode !== UP_ARROW && keyCode !== DOWN_ARROW) {
        currentSpeed = baseSpeed;
        updateSpeedDisplay();
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
