<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Follow - Systems Thinking & Focus Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #12141c; /* Beruhigendes, tiefes Dunkelblau-Grau */
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        
        /* Der Textblock über dem Kunstwerk */
        .header-section {
            position: absolute;
            top: 12%;
            width: 100%;
            text-align: center;
            color: #e0e6ed;
            pointer-events: none; /* Klicks gehen durch den Text ans Canvas */
        }

        /* Die Augen-Emojis für die intuitive Anleitung */
        .eyes-icon {
            display: block;
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        /* Die deutsche Überschrift */
        .headline {
            display: block;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Das englische Äquivalent direkt darunter */
        .subheadline {
            display: block;
            font-size: 1.4rem;
            color: #8a99ad;
            margin-top: 8px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="header-section">
    <span class="eyes-icon">👀</span>
    <span class="headline">Ich finde gute Lösungen</span>
    <span class="subheadline">I discover effective solutions</span>
</div>

<script>
// Dynamische Links-Rechts-Bewegung
let speed = 0.55; 
let ballSize = 35; // Größe des Punkts

function setup() {
    createCanvas(windowWidth, windowHeight);
}

function draw() {
    // Kleiner Alpha-Wert für einen ganz zarten Schweif-Effekt
    background(18, 20, 28, 40); 
    
    let time = millis() / 1000;
    
    // Y-Position ist genau in der Mitte des Bildschirms
    let y = height * 0.55; 
    
    // Berechnung der Links-Rechts-Bewegung mittels Sinus
    // Der Puffer (margin) wurde auf nur noch 5% reduziert für maximale Breite (fast bis zum Rand)
    let margin = width * 0.05; 
    let x = map(sin(time * speed * TWO_PI), -1, 1, margin, width - margin);
    
    // Wir zeichnen ein sanftes, fokussierendes Licht (helles Pastell-Cyan/Grün)
    noStroke();
    fill(140, 215, 230);
    
    // Hauptpunkt
    ellipse(x, y, ballSize, ballSize);
    
    // Ein kleiner, weicher Glow-Effekt im Hintergrund des Punktes
    fill(140, 215, 230, 30);
    ellipse(x, y, ballSize * 1.6, ballSize * 1.6);
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
