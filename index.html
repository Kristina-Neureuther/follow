<script>
// Die Geschwindigkeit wurde auf 0.95 erhöht für ein schnelles, aktives Tracking von Rand zu Rand
let speed = 0.95; 
let ballSize = 35; // Größe des Punkts

function setup() {
    createCanvas(windowWidth, windowHeight);
}

function draw() {
    // Kleiner Alpha-Wert für einen ganz zarten Schweif-Effekt
    background(18, 20, 28, 40); 
    
    let time = millis() / 1000;
    
    // Y-Position ist genau in der Mitte des Bildschirms
    let y = height * 0.55; 
    
    // Berechnung der Links-Rechts-Bewegung mittels Sinus
    let margin = width * 0.05; 
    let x = map(sin(time * speed * TWO_PI), -1, 1, margin, width - margin);
    
    // Wir zeichnen ein sanftes, fokussierendes Licht
    noStroke();
    fill(140, 215, 230);
    
    // Hauptpunkt
    ellipse(x, y, ballSize, ballSize);
    
    // Ein kleiner, weicher Glow-Effekt im Hintergrund des Punktes
    fill(140, 215, 230, 30);
    ellipse(x, y, ballSize * 1.6, ballSize * 1.6);
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>
